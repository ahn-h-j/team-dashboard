server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/team_dashboard
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret: team-dashboard-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000
