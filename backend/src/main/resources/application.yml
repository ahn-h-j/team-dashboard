server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/team_dashboard
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret: ${JWT_SECRET:team-dashboard-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256}
  expiration: 86400000
  refresh-expiration: 604800000
